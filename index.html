<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Modern Clone</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ffffff;
            --accent: #3d3d3d;
            --font-main: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            line-height: 1.5;
        }

        /* Sticky Navigation */
        nav {
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 5%;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: 0.3s;
        }

        .nav-links a:hover { opacity: 1; }

        /* Hero Section */
        .hero {
            padding: 120px 5% 60px;
            max-width: 1200px;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 1;
            font-weight: 500;
            margin-bottom: 40px;
            letter-spacing: -2px;
        }

        /* Project Grid */
        .project-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px 5%;
        }

        .project-card {
            background: var(--accent);
            height: 500px;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .project-card:hover {
            transform: scale(0.98);
        }

        .project-info {
            position: absolute;
            bottom: 30px;
            left: 30px;
        }

        .project-info h3 { font-size: 1.5rem; margin-bottom: 5px; }
        .project-info p { opacity: 0.6; font-size: 0.8rem; text-transform: uppercase; }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            .project-grid { grid-template-columns: 1fr; }
            .project-card { height: 400px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">PORTFOLIO.</div>
        <div class="nav-links">
            <a href="#work">Work</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <section class="hero">
        <h1>Building digital <br> experiences & systems.</h1>
    </section>

    <section id="work" class="project-grid">
        <div class="project-card" style="background: linear-gradient(45deg, #1e3c72, #2a5298);">
            <div class="project-info">
                <p>Infrastructure</p>
                <h3>SCADA Integration</h3>
            </div>
        </div>

        <div class="project-card" style="background: linear-gradient(45deg, #2c3e50, #4ca1af);">
            <div class="project-info">
                <p>Public Service</p>
                <h3>Governance Reform</h3>
            </div>
        </div>

        <div class="project-card" style="background: linear-gradient(45deg, #134e5e, #71b280);">
            <div class="project-info">
                <p>Management</p>
                <h3>HR Development</h3>
            </div>
        </div>

        <div class="project-card" style="background: linear-gradient(45deg, #434343, #000000);">
            <div class="project-info">
                <p>Technical</p>
                <h3>Procurement Audit</h3>
            </div>
        </div>
    </section>

    <script>
        // Smooth scroll reveal effect
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = "1";
                    entry.target.style.transform = "translateY(0)";
                }
            });
        }, observerOptions);

        document.querySelectorAll('.project-card').forEach(card => {
            card.style.opacity = "0";
            card.style.transform = "translateY(30px)";
            card.style.transition = "all 0.8s ease-out";
            observer.observe(card);
        });
    </script>
</body>
</html>
